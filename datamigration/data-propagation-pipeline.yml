# =============================================================================
# DATA PROPAGATION PIPELINE
# =============================================================================
# Purpose:  Copy lookup/rules table data from a source DB to a target DB,
#           preserving primary keys and foreign-key relationships.
#
# Trigger:  Manual only (no CI trigger)
#
# Supported Paths:
#   QA  → DEV    (preserve test scenarios before QA changes)
#   QA  → UAT    (promote tested changes for prod release)
#   UAT → QA     (refresh QA with current prod-state from UAT)
#   UAT → PROD   (deploy validated data to production)
#
# NOTE: This pipeline does NOT use Environments. PROD approval is handled
#       by a confirmation parameter that must be explicitly set to 'Yes'.
# =============================================================================

trigger: none
pr: none

parameters:
  # ─── Source Environment ───────────────────────────────────────────────
  - name: sourceEnvironment
    displayName: 'Source Environment'
    type: string
    default: 'QA'
    values:
      - QA
      - UAT

  # ─── Target Environment ──────────────────────────────────────────────
  - name: targetEnvironment
    displayName: 'Target Environment'
    type: string
    default: 'DEV'
    values:
      - DEV
      - QA
      - UAT
      - PROD

  # ─── Table List ──────────────────────────────────────────────────────
  # Comma-separated, in DEPENDENCY ORDER (parent tables first).
  # The script will truncate in reverse order and insert in this order.
  - name: tableList
    displayName: 'Tables to Copy (comma-separated, parent-first dependency order)'
    type: string
    default: 'LookupCategory,LookupItem,RuleCategory,RuleSet,Rule,RuleCondition'

  # ─── Schema Name ─────────────────────────────────────────────────────
  - name: schemaName
    displayName: 'Database Schema'
    type: string
    default: 'dbo'

  # ─── Dry Run ─────────────────────────────────────────────────────────
  - name: dryRun
    displayName: 'Dry Run (preview only, no changes)'
    type: boolean
    default: false

  # ─── PROD Confirmation ───────────────────────────────────────────────
  # Replaces the Environment approval gate.
  # When targeting PROD, you MUST set this to 'Yes' or the pipeline
  # will stop with an error. Prevents accidental PROD deployments.
  - name: prodConfirmation
    displayName: 'PROD Confirmation (set to Yes ONLY when targeting PROD)'
    type: string
    default: 'No'
    values:
      - 'No'
      - 'Yes'

# ═══════════════════════════════════════════════════════════════════════════
# VARIABLES
# ═══════════════════════════════════════════════════════════════════════════
#
# Create a Variable Group named "DataPropagation-ConnectionStrings"
# in Pipelines > Library with these SECRET variables:
#
#   SqlConnection_DEV
#   SqlConnection_QA
#   SqlConnection_UAT
#   SqlConnection_PROD
#
# ═══════════════════════════════════════════════════════════════════════════

variables:
  - group: DataPropagation-ConnectionStrings

# ═══════════════════════════════════════════════════════════════════════════
# SINGLE STAGE — Validate + Propagate in one job (no Environments needed)
# ═══════════════════════════════════════════════════════════════════════════

stages:
  - stage: DataPropagation
    displayName: 'Data Propagation: ${{ parameters.sourceEnvironment }} → ${{ parameters.targetEnvironment }}'
    jobs:
      - job: PropagateData
        displayName: 'Validate and Copy Data'
        pool:
          vmImage: 'windows-latest'
        steps:

          # ── Step 1: Validate parameters ──────────────────────────────
          - task: PowerShell@2
            displayName: 'Validate Parameters'
            inputs:
              targetType: 'inline'
              script: |
                $source = "${{ parameters.sourceEnvironment }}"
                $target = "${{ parameters.targetEnvironment }}"
                $prodConfirm = "${{ parameters.prodConfirmation }}"

                Write-Host "========================================="
                Write-Host "  DATA PROPAGATION PIPELINE"
                Write-Host "========================================="
                Write-Host "  Source:       $source"
                Write-Host "  Target:       $target"
                Write-Host "  Tables:       ${{ parameters.tableList }}"
                Write-Host "  Schema:       ${{ parameters.schemaName }}"
                Write-Host "  Dry Run:      ${{ parameters.dryRun }}"
                Write-Host "  PROD Confirm: $prodConfirm"
                Write-Host "========================================="

                # Source and target cannot be the same
                if ($source -eq $target) {
                    Write-Error "Source and target environments cannot be the same!"
                    exit 1
                }

                # Only allow valid propagation paths
                $validPaths = @(
                    "QA->DEV",
                    "QA->UAT",
                    "UAT->QA",
                    "UAT->PROD"
                )
                $currentPath = "$source->$target"
                if ($currentPath -notin $validPaths) {
                    Write-Error "Invalid propagation path: $currentPath. Valid paths are: $($validPaths -join ', ')"
                    exit 1
                }

                # PROD safety gate
                if ($target -eq "PROD") {
                    if ($prodConfirm -ne "Yes") {
                        Write-Error "PROD target requires PROD Confirmation to be set to 'Yes'. This is a safety gate to prevent accidental production deployments. Re-run the pipeline and set PROD Confirmation to 'Yes' if you intend to deploy to production."
                        exit 1
                    }
                    Write-Host ""
                    Write-Host "  *** PROD CONFIRMATION RECEIVED ***"
                    Write-Host "  Data will be written to PRODUCTION."
                    Write-Host ""
                }

                Write-Host "Validation passed."

          # ── Step 2: Checkout repo so script file is available ─────────
          - checkout: self

          # ── Step 3: Run the data propagation script ──────────────────
          - task: PowerShell@2
            displayName: 'Run Data Propagation'
            inputs:
              filePath: '$(Build.SourcesDirectory)/pipelines/scripts/Invoke-DataPropagation.ps1'
              arguments: >-
                -SourceConnectionString "$(SqlConnection_${{ parameters.sourceEnvironment }})"
                -TargetConnectionString "$(SqlConnection_${{ parameters.targetEnvironment }})"
                -TableList "${{ parameters.tableList }}"
                -SchemaName "${{ parameters.schemaName }}"
                -DryRun:$${{ parameters.dryRun }}
                -SourceEnv "${{ parameters.sourceEnvironment }}"
                -TargetEnv "${{ parameters.targetEnvironment }}"
            env:
              # Explicitly pass all secret variables so they resolve
              SqlConnection_DEV: $(SqlConnection_DEV)
              SqlConnection_QA: $(SqlConnection_QA)
              SqlConnection_UAT: $(SqlConnection_UAT)
              SqlConnection_PROD: $(SqlConnection_PROD)
